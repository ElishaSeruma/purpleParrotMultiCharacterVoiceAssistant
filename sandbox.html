<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Purple Parrot Voice Core - Sandbox Console</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #121214; color: #E1E1E6; padding: 40px; margin: 0; transition: background 0.5s ease; }
        .card { background: #202024; border: 1px solid #323238; padding: 24px; border-radius: 8px; max-width: 600px; margin: 0 auto; transition: border-color 0.5s ease; }
        h2 { margin-top: 0; color: #07D6A0; transition: color 0.5s ease; }
        .btn-group { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 20px 0; }
        .persona-btn { background: #29292E; color: #FFF; border: 1px solid #323238; padding: 10px; border-radius: 4px; cursor: pointer; font-weight: bold; transition: all 0.3s ease; }
        .persona-btn:hover { background: #3E3E43; }
        button.action-btn { background: #07D6A0; color: #121214; border: none; padding: 12px 24px; border-radius: 4px; font-weight: bold; cursor: pointer; width: 100%; font-size: 16px; transition: background 0.3s ease; }
        #status, #payloadLog { margin-top: 20px; padding: 12px; border-radius: 4px; background: #121214; border: 1px solid #323238; font-family: monospace; font-size: 12px; white-space: pre-wrap; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/livekit-client/dist/livekit-client.umd.min.js"></script>
</head>
<body>

<div class="card" id="appCard">
    <h2 id="titleHeader">Kami Voice Engine Control Room</h2>
    <p>Simulate baseline environments and hot-swap active system characters.</p>
    
    <label style="font-size: 14px; color: #A8A8B3;">Select Character Node:</label>
    <div class="btn-group">
        <button class="persona-btn" onclick="triggerMorph('kami')">Kami (Default)</button>
        <button class="persona-btn" onclick="triggerMorph('patty')">Patty (Teen Parrot)</button>
        <button class="persona-btn" onclick="triggerMorph('tavo')">Tavo (Old Sheriff)</button>
    </div>

    <div id="status">Status: Control Channel Disconnected</div>
    <div id="payloadLog">ThemeMutationEvent Stream: Awaiting pipeline handshake...</div>
</div>

<script>
    let controlSocket;

    function initControlChannel() {
        // Establishes our live state bridge with FastAPI
        const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        controlSocket = new WebSocket(`${protocol}//${window.location.host}/api/v1/voice/control`);

        controlSocket.onmessage = (event) => {
            const data = JSON.parse(event.data);
            document.getElementById('payloadLog').innerText = JSON.stringify(data, null, 2);
            
            if (data.ThemeMutationEvent) {
                executeGlobalMorph(data.ThemeMutationEvent);
            }
        };

        controlSocket.onopen = () => {
            document.getElementById('status').innerText = "Status: Control Plane Connected Active";
            document.getElementById('status').style.color = "#07D6A0";
        };
    }

    function triggerMorph(personaName) {
        if (controlSocket && controlSocket.readyState === WebSocket.OPEN) {
            controlSocket.send(JSON.stringify({ "request_persona_mutation": personaName }));
        }
    }

    function executeGlobalMorph(eventData) {
        const changes = eventData.structural_changes;
        const primaryColor = changes.color_palette.primary;
        const backgroundColor = changes.color_palette.background;
        
        // Execute smooth root layout DOM mutations instantly 
        document.body.style.background = backgroundColor;
        document.getElementById('appCard').style.borderColor = primaryColor;
        document.getElementById('titleHeader').style.color = primaryColor;
        document.getElementById('titleHeader').innerText = `Active Persona: ${eventData.target_persona.toUpperCase()}`;
    }

    // Auto-fire control connection on window baseline mount
    window.onload = initControlChannel;
</script>
</body>
</html>
